# This workflow is responsible for making releases of this GAP package,
# and updating its website afterwards. For usage instructions, see
# <https://github.com/gap-actions/release-pkg/>.
name: Release

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Dry run: only create an archive containing the release instead of publishing it on GitHub"
        type: boolean
        required: false
        default: false
      force:
        description: "Force: allow overwriting an existing release, or making a release with an incorrect date"
        type: boolean
        required: false
        default: false

permissions: write-all

jobs:
  release:
    name: "Release the GAP package"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: gap-actions/setup-gap@v3
        with:
          gap-version: 'devel'
      - shell: bash
        run: |
          cd $GAPROOT/pkg
          git clone https://github.com/gap-packages/AttributeScheduler.git
          git clone https://github.com/gap-packages/NautyTracesInterface.git
          ../bin/BuildPackages.sh io profiling AttributeScheduler grape datastructures orb digraphs NautyTracesInterface
      - uses: gap-actions/build-pkg-docs@v2
        with:
          use-latex: true
      - uses: gap-actions/release-pkg@v1
        with:
          dry-run: ${{ inputs.dry-run }}
          force: ${{ inputs.force }}
      - uses: gap-actions/update-gh-pages@v1
        if: ${{ !inputs.dry-run }}
        with:
          path: doc
          extra-files: |
            .nojekyll
            doc/images
      - name: Build index.html via Jekyll and push to gh-pages
        if: ${{ !inputs.dry-run }}
        run: |
          gem install jekyll
          git clone --branch gh-pages https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} gh-pages-build
          cd gh-pages-build
          jekyll build
          cp _site/index.html index.html
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Add pre-built index.html"
          git push
